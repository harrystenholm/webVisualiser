<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webVisualiser</title>
    <link rel="stylesheet" href = "style.css">
</head>
<body>
    <div id="overlay">CLICK TO START</div>
    <canvas id="visualiser"></canvas>

    <div id="toolbar">  

        <div class="spacer"></div>

        <div class="control">
            <label>Theme</label>
            <select id="colorTheme">
                <option value="ocean">Ocean</option>
                <option value="fire">Fire</option>
                <option value="forest">Forest</option>
            </select>
        </div>

        <div class="control">
            <label>Mode</label>
            <select id="mode">
                <option value="waveform">Waveform</option>
                <option value="frequency">Frequency</option>
            </select>
        </div>

        <div class="settings">
            <div class="settingsLabel">
                <label>Advanced</label>
                <input type="checkbox" id="advanced", name="advanced">
            </div>
        </div>
    </div>
    
    <div id="side-panel" class="hidden">
        <h3>Visual Settings</h3>
        <div class="control">
            <label>Trail Count</label>
            <input type="range" id="trailCount" min="0" max="20" value="12">
        </div>
        <div class="control">
            <label>Ellipse Count</label>
            <input type="range" id="ellipseCount" min="0" max="20" value="15">
        </div>
    </div>


    <script src="visualiser.js"></script>
</body>
</html>
