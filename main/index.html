<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webVisualiser</title>
    <link rel="stylesheet" href = "style.css">
</head>
<body>
    <div id="overlay">CLICK TO START</div>
    <canvas id="visualiser"></canvas>

    <div id="toolbar">  

        <div class="typeOptions">
            <div class = "optionsLabel">
                <label>Type</label>
                <select id="type">
                    <option value="waveform">Signal</option>
                    <option value="default">Ellipse</option>
                </select>
            </div>
        </div>

        <div class="control">
            <label>Theme</label>
            <select id="theme">
                <option value="fire">Fire</option>
                <option value="ocean">Ocean</option>
                <option value="forest">Forest</option>
            </select>
        </div>

        <div class="control">
            <label>Mode</label>
            <select id="mode">
                <option value="frequency">Frequency</option>
                <option value="waveform">Waveform</option>
            </select>
        </div>

        <div class="settings">
            <div class="settingsLabel">
                <label>Advanced</label>
                <input type="checkbox" id="advanced", name="advanced">
            </div>
        </div>
    </div>
    
    <div id="side-panel" class="hidden">
        <h3>Line Settings</h3>
        <div class="control">
            <label>Density</label>
            <input type="range" id="lineDensity" min="1" max="120" value="60">
        </div>
        <div class="control">
            <label>Trail Count</label>
            <input type="range" id="trailCount" min="0" max="20" value="3">
        </div>
        <h3>Ellipse Settings</h3>
        <div class="control">
            <label>Ellipse Count</label>
            <input type="range" id="ellipseCount" min="0" max="12" value="4">
        </div>
    </div>


    <script src="visualiser.js"></script>
</body>
</html>
